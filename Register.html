<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - GlowingDiva</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #fff0f5, #ffe4ec);
}

/* NAVBAR */
.navbar {
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}
.navbar-brand {
    color: #e91e63 !important;
    font-weight: bold;
}

/* HERO */
.hero {
    height: 220px;
    background: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
}
.hero::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 220px;
    background: linear-gradient(to right, rgba(0,0,0,0.6), rgba(233,30,99,0.4));
}
.hero h1 {
    position: relative;
    color: white;
}

/* PANELS */
.panel {
    background: rgba(255,255,255,0.9);
    border-radius: 15px;
    padding: 25px;
    transition: 0.4s;
}
.panel:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* INPUTS */
input, select {
    border-radius: 10px !important;
    transition: 0.3s;
}
input:focus, select:focus {
    border-color: #e91e63 !important;
    box-shadow: 0 0 8px rgba(233,30,99,0.2);
}

/* BUTTON */
.btn-pink {
    background: linear-gradient(45deg, #e91e63, #ff4081);
    color: white;
    border: none;
    transition: 0.3s;
}
.btn-pink:hover {
    transform: scale(1.03);
    box-shadow: 0 5px 15px rgba(233,30,99,0.4);
}

/* ANIMATION */
.fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.7s;
}
.fade-up.show {
    opacity: 1;
    transform: translateY(0);
}

/* FOOTER */
.footer {
    background: #111;
    color: white;
    padding: 20px;
    text-align: center;
}
</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg py-3 sticky-top">
<div class="container">

<a class="navbar-brand">GlowingDiva</a>

<div class="ms-auto d-flex align-items-center">
<a href="home.html" class="me-3 text-dark">Home</a>
<a href="login.html" class="me-3 text-dark">Login</a>

<input class="form-control me-2 rounded-pill" placeholder="Search...">
<i class="bi bi-cart fs-5"></i>
</div>

</div>
</nav>

<!-- HERO -->

<section class="hero">
<h1>Create Your Account</h1>
</section>

<!-- MAIN -->

<div class="container py-5">
<div class="row g-4">

<!-- LEFT -->

<div class="col-md-4 fade-up">
<div class="panel">

<h5>Why Join Us? 💄</h5>

<ul class="mt-3">
<li>✔ Exclusive discounts</li>
<li>✔ Birthday gifts</li>
<li>✔ Order tracking</li>
<li>✔ Early access</li>
<li>✔ Reward points</li>
</ul>

<hr>

<p>Already a member? <a href="login.html">Sign In</a></p>

</div>
</div>

<!-- RIGHT -->

<div class="col-md-8 fade-up">
<div class="panel">

<h5 class="mb-3">Personal Details</h5>

<form onsubmit="showPopup(event)">

<div class="row">
<div class="col-md-6">
<input class="form-control mb-3" placeholder="First Name" required>
</div>
<div class="col-md-6">
<input class="form-control mb-3" placeholder="Last Name" required>
</div>
</div>

<input type="email" class="form-control mb-3" placeholder="Email Address" required>

<div class="row">
<div class="col-md-4">
<input class="form-control mb-3" value="+91" readonly>
</div>
<div class="col-md-8">
<input class="form-control mb-3" placeholder="Phone Number">
</div>
</div>

<div class="row">
<div class="col-md-6">
<input type="date" class="form-control mb-3">
</div>
<div class="col-md-6">
<select class="form-control mb-3">
<option>Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>
</div>
</div>

<input type="password" class="form-control mb-3" placeholder="Password">
<input type="password" class="form-control mb-3" placeholder="Confirm Password">

<div class="form-check mb-2">
<input class="form-check-input" type="checkbox">
<label>I agree to Terms</label>
</div>

<button class="btn btn-pink w-100">Create Account</button>

</form>

</div>
</div>

</div>
</div>

<!-- FOOTER -->

<footer class="footer">
<p>© 2026 BeautyStore</p>
</footer>

<!-- POPUP -->

<div class="modal fade" id="successModal">
<div class="modal-dialog modal-dialog-centered">
<div class="modal-content text-center p-4">
<h4>🎉 Registered Successfully!</h4>
<p>Welcome to GlowingDiva 💄</p>
<button class="btn btn-pink" data-bs-dismiss="modal">OK</button>
</div>
</div>
</div>

<!-- JS -->

<script>
function showPopup(e){
e.preventDefault();
new bootstrap.Modal(document.getElementById('successModal')).show();
}

/* Scroll Animation */
const elements = document.querySelectorAll('.fade-up');
window.addEventListener('scroll', () => {
elements.forEach(el => {
if(el.getBoundingClientRect().top < window.innerHeight - 50){
el.classList.add('show');
}
});
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
