<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - GlowingDiva</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #fff0f5, #ffe4ec);
        }

        /* Loader */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #eee;
            border-top: 5px solid #e91e63;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
        }

        /* Hero */
        .hero {
            position: relative;
            height: 250px;
            background: url('https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.6), rgba(233, 30, 99, 0.4));
        }

        .hero h1 {
            position: relative;
            color: white;
        }

        /* Box */
        .contact-box {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(15px);
            padding: 30px;
            border-radius: 15px;
        }

        /* Inputs */
        input,
        textarea {
            border-radius: 10px !important;
        }

        input:focus,
        textarea:focus {
            border-color: #e91e63 !important;
        }

        /* Button */
        .btn-pink {
            background: linear-gradient(45deg, #e91e63, #ff4081);
            color: white;
            border: none;
        }

        /* Footer */
        .footer {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- Loader -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">

            <a class="navbar-brand text-danger fw-bold">GlowingDiva</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <form class="d-flex mx-auto w-50">
                    <input class="form-control me-2 rounded-pill" placeholder="Search products...">
                    <button class="btn btn-danger rounded-pill">Search</button>
                </form>

                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link" href="home.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link">Categories</a>
                    </li>
                    <li class="nav-item">
                        <i class="bi bi-person fs-5"></i>
                    </li>
                    <li class="nav-item position-relative">
                        <i class="bi bi-cart fs-5"></i>
                        <span class="badge bg-danger position-absolute top-0 start-100 translate-middle">2</span>
                    </li>
                </ul>

            </div>
        </div>
    </nav>

    <!-- Hero -->
    <section class="hero">
        <h1>Contact Us</h1>
    </section>

    <!-- Contact Section -->
    <div class="container py-5">
        <div class="row g-4">

            <!-- Info -->
            <div class="col-md-5">
                <div class="contact-box">
                    <h4>Contact Info 💄</h4>
                    <p class="text-muted">We’d love to hear from you!</p>

                    <p>
                        <i class="bi bi-geo-alt-fill text-danger"></i> Mumbai, India
                    </p>
                    <p>
                        <i class="bi bi-envelope-fill text-danger"></i> support@glowingdiva.com
                    </p>
                    <p>
                        <i class="bi bi-telephone-fill text-danger"></i> +91 9876543210
                    </p>
                </div>
            </div>

            <!-- Form -->
            <div class="col-md-7">
                <div class="contact-box">
                    <h4 class="text-center mb-3">Get in Touch 💌</h4>

                    <form onsubmit="showPopup(event)">
                        <input class="form-control mb-3" placeholder="Name" required>
                        <input type="email" class="form-control mb-3" placeholder="Email" required>
                        <textarea class="form-control mb-3" rows="4" placeholder="Message" required></textarea>

                        <button class="btn btn-pink w-100">Send Message</button>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <!-- Google Map -->
    <div class="container mb-5">
        <iframe src="https://maps.google.com/maps?q=Mumbai&t=&z=13&ie=UTF8&iwloc=&output=embed"
            width="100%" height="300" style="border-radius:15px;"></iframe>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 BeautyStore</p>
        <i class="bi bi-facebook"></i>
        <i class="bi bi-instagram mx-2"></i>
        <i class="bi bi-twitter"></i>
    </footer>

    <!-- Popup -->
    <div class="modal fade" id="successModal">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <h4>🎉 Message Sent!</h4>
                <p>We’ll get back to you soon.</p>
                <button class="btn btn-pink" data-bs-dismiss="modal">OK</button>
            </div>
        </div>
    </div>

    <!-- JS -->
    <script>
        window.addEventListener("load", function () {
            document.getElementById("loader").style.display = "none";
        });

        function showPopup(e) {
            e.preventDefault();
            var myModal = new bootstrap.Modal(document.getElementById('successModal'));
            myModal.show();
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
