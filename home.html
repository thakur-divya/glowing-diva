<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlowingDiva</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #fafafa;
        }

        /* LOADER */
        #loader {
            position: fixed;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #eee;
            border-top: 5px solid #e91e63;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Navbar */
        .navbar {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .navbar-brand {
            font-size: 24px;
        }

        .nav-link {
            margin: 0 10px;
        }

        /* Hero */
        .hero {
            position: relative;
            height: 420px;
            background: url('https://images.unsplash.com/photo-1596462502278-27bfdc403348') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, rgba(0, 0, 0, 0.6), rgba(233, 30, 99, 0.3));
        }

        .hero div {
            position: relative;
            color: white;
            text-align: center;
            animation: fadeIn 2s;
        }

        .hero h1 {
            font-size: 52px;
        }

        /* Button */
        .btn-pink {
            background: linear-gradient(45deg, #e91e63, #ff4081);
            border: none;
            color: white;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Product */
        .product-card {
            border-radius: 20px;
            overflow: hidden;
            transition: 0.4s;
            position: relative;
            animation: fadeIn 1s;
        }

        .product-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
        }

        .product-img {
            height: 250px;
            object-fit: cover;
        }

        .price {
            color: #e91e63;
            font-weight: bold;
        }

        /* Wishlist */
        .wishlist {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            border-radius: 50%;
            padding: 5px 8px;
        }

        /* Category */
        .category-box {
            background: linear-gradient(45deg, #fff0f5, #ffe4ec);
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .category-box:hover {
            transform: translateY(-5px);
        }

        /* Footer */
        .footer {
            background: #111;
            color: white;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

    <!-- LOADER -->
    <div id="loader">
        <div class="spinner"></div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-lg py-3">
        <div class="container">

            <a class="navbar-brand text-danger fw-bold">GlowingDiva</a>

            <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <form class="d-flex mx-auto w-50">
                    <input class="form-control me-2 rounded-pill" placeholder="Search products...">
                    <button class="btn btn-danger rounded-pill">Search</button>
                </form>

                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link">Home</a></li>
                    <li class="nav-item"><a class="nav-link">Categories</a></li>
                    <li class="nav-item"><i class="bi bi-person fs-5"></i></li>

                    <li class="nav-item position-relative">
                        <i class="bi bi-cart fs-5"></i>
                        <span class="badge bg-danger position-absolute top-0 start-100 translate-middle">2</span>
                    </li>
                </ul>

            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="hero">
        <div>
            <h1>Beauty That Speaks</h1>
            <p>Discover premium makeup products</p>
            <button class="btn btn-pink px-4">Shop Now</button>
        </div>
    </section>

    <!-- PRODUCTS -->
    <div class="container py-5">
        <h3 class="text-center mb-4">Trending Products</h3>

        <div class="row g-4">

            <div class="col-md-4">
                <div class="card product-card shadow">
                    <div class="wishlist"><i class="bi bi-heart"></i></div>
                    <img src="images/lipstick.jpeg" class="product-img">
                    <div class="card-body text-center">
                        <h6>Luxury Lipstick</h6>
                        <p class="price">₹599</p>
                        <button class="btn btn-pink btn-sm">Add to Cart</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card product-card shadow">
                    <div class="wishlist"><i class="bi bi-heart"></i></div>
                    <img src="images/foundation.jpeg" class="product-img">
                    <div class="card-body text-center">
                        <h6>Matte Foundation</h6>
                        <p class="price">₹999</p>
                        <button class="btn btn-pink btn-sm">Add to Cart</button>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card product-card shadow">
                    <div class="wishlist"><i class="bi bi-heart"></i></div>
                    <img src="images/download.jpeg" class="product-img">
                    <div class="card-body text-center">
                        <h6>Eye Makeup Kit</h6>
                        <p class="price">₹799</p>
                        <button class="btn btn-pink btn-sm">Add to Cart</button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- CATEGORY -->
    <div class="container pb-5">
        <h3 class="text-center mb-4">Shop by Category</h3>

        <div class="row text-center g-4">
            <div class="col-md-3">
                <div class="category-box">Face</div>
            </div>
            <div class="col-md-3">
                <div class="category-box">Eyes</div>
            </div>
            <div class="col-md-3">
                <div class="category-box">Lips</div>
            </div>
            <div class="col-md-3">
                <div class="category-box">Skincare</div>
            </div>
        </div>
    </div>

    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2026 BeautyStore</p>
        <i class="bi bi-facebook"></i>
        <i class="bi bi-instagram mx-2"></i>
        <i class="bi bi-twitter"></i>
    </footer>

    <!-- JS -->
    <script>
        window.addEventListener("load", function () {
            document.getElementById("loader").style.display = "none";
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
